<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gajraj Kirana — Starting...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(34, 197, 94, 0.3);
    }

    .icon svg {
      width: 44px;
      height: 44px;
      fill: none;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(to right, #22c55e, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 32px;
    }

    .spinner-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #334155;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 0.85rem;
      color: #64748b;
      transition: opacity 0.3s;
    }

    .progress-bar {
      width: 200px;
      height: 3px;
      background: #1e293b;
      border-radius: 3px;
      margin: 20px auto 0;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #f59e0b);
      border-radius: 3px;
      width: 0%;
      animation: progress 8s ease-out forwards;
    }

    @keyframes progress {
      0% { width: 0%; }
      30% { width: 40%; }
      60% { width: 70%; }
      80% { width: 85%; }
      95% { width: 95%; }
      100% { width: 95%; }
    }

    .version {
      position: fixed;
      bottom: 16px;
      right: 20px;
      font-size: 0.7rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
    </div>
    <h1>Gajraj Kirana</h1>
    <p class="subtitle">Billing Software</p>
    
    <div class="spinner-container">
      <div class="spinner"></div>
      <span class="status" id="status">Starting server...</span>
    </div>
    
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <div class="version">v1.0.0</div>

  <script>
    const statusEl = document.getElementById('status');
    const messages = [
      { delay: 1000, text: 'Initializing database...' },
      { delay: 3000, text: 'Loading application...' },
      { delay: 5000, text: 'Almost ready...' },
    ];

    messages.forEach(({ delay, text }) => {
      setTimeout(() => { statusEl.textContent = text; }, delay);
    });

    // Poll the server to check if it's ready
    const PORT = new URLSearchParams(window.location.search).get('port') || '3000';
    const checkInterval = setInterval(async () => {
      try {
        const res = await fetch(`http://127.0.0.1:${PORT}/`);
        if (res.ok) {
          clearInterval(checkInterval);
          statusEl.textContent = 'Ready! Redirecting...';
          setTimeout(() => {
            window.location.href = `http://127.0.0.1:${PORT}`;
          }, 500);
        }
      } catch (e) { /* server not ready yet */ }
    }, 1000);
  </script>
</body>
</html>
